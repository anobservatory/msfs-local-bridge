name: Package WinUI Assistant

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label for package
        required: true
        default: "0.1.0"
      self_contained:
        description: Build self-contained package
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "winui-v*"

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve package version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $selfContained = "${{ inputs.self_contained }}"
          }
          else {
            $tagName = "${{ github.ref_name }}"
            $version = $tagName -replace '^winui-v', ''
            $selfContained = "true"
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Version could not be resolved."
          }

          if ([string]::IsNullOrWhiteSpace($selfContained)) {
            $selfContained = "true"
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SELF_CONTAINED=$selfContained" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish WinUI package
        shell: pwsh
        run: |
          $isSelfContained = [System.Convert]::ToBoolean($env:SELF_CONTAINED)
          .\publish-winui-v0.ps1 -Version $env:VERSION -SelfContained $isSelfContained

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: winui-assistant-${{ env.VERSION }}
          path: |
            dist/*.zip
            dist/SHA256SUMS-winui-v*.txt
